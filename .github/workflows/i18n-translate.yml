name: i18n translate

# Optional CI path for the translation pipeline. The PRIMARY path is the local
# daily runner (hack/i18n/run-daily.sh) driven by the maintainer's Claude
# subscription (OAuth/Max) — see hack/i18n/README.md. This workflow exists for
# running the same pipeline in CI when a subscription OAuth token is available
# as a secret (CLAUDE_CODE_OAUTH_TOKEN, from `claude setup-token`). It is
# manual-dispatch only; there is no metered API key here.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Restrict to one language code (blank = all)"
        required: false
      limit:
        description: "Max pages this run (blank = until the limit)"
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n-translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install claude-agent-sdk pyyaml
      # The Python Agent SDK drives the Claude Code binary; install it so the
      # subscription auth path works in CI.
      - run: npm install -g @anthropic-ai/claude-code


      - name: Translate + review gate (Max subscription via Agent SDK)
        env:
          # Subscription OAuth token from `claude setup-token` — NOT an API key.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Inputs go through env, never interpolated into the shell: a `${{ }}`
          # expansion in `run:` lets anyone with write access inject commands and
          # exfiltrate the token above.
          LANG_INPUT: ${{ github.event.inputs.lang }}
          LIMIT_INPUT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail
          args=()
          [ -n "$LANG_INPUT" ] && args+=(--lang "$LANG_INPUT")
          [ -n "$LIMIT_INPUT" ] && args+=(--limit "$LIMIT_INPUT")
          python3 hack/i18n/translate.py "${args[@]}"

      - name: Verify i18n freshness & parity
        run: ./hack/check-i18n.sh

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- content/; then echo "no changes"; exit 0; fi
          BRANCH="i18n/ci-$(git rev-parse --short HEAD)-${GITHUB_RUN_ID}"
          git config user.name "cozystack-i18n-bot"
          git config user.email "noreply@cozystack.io"
          git checkout -b "$BRANCH"
          git add content/
          git commit --signoff -m "i18n: machine-reviewed translation update"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "i18n: translation update" \
            --body "Automated. content/<lang> only (CODEOWNERS-exempt); back-translation + two native reviewers passed."
          gh pr merge "$BRANCH" --auto --squash || echo "auto-merge not enabled; PR left open"
