# Cozystack website translation pipeline — configuration.
#
# Single source of truth for the automated i18n pipeline: which languages
# exist, which model translates which content, and which paths are in scope.
# Consumed by hack/i18n/*.py and hack/i18n/run-daily.sh.

source_lang: en
content_dir: content

# Auth. Two supported modes — pick one; switching is a config change only, the
# code path is identical:
#   oauth-subscription : a Claude subscription (Max) via the Claude Agent SDK.
#                        No metered billing. Credential = a logged-in `claude`
#                        CLI on the runner, or CLAUDE_CODE_OAUTH_TOKEN
#                        (`claude setup-token`) for headless/CI. The run refuses
#                        to start if ANTHROPIC_API_KEY is set, since that would
#                        shadow the subscription and bill metered API.
#   api-key            : metered Claude API billed to an organization account.
#                        Requires ANTHROPIC_API_KEY. Prefer an org-owned key
#                        (not a personal one) so the pipeline does not depend on
#                        one individual.
#
# Current plan: bootstrap the backlog on a maintainer's subscription, then move
# to an organization-owned API key once it is provisioned — see README
# "Ownership and continuity".
auth: oauth-subscription

# Cadence: run daily until the account's usage limit is hit. On a usage-limit
# error the pipeline stops cleanly (exit 0) and resumes the next day. Pages are
# written only after the review gate finishes, so an interrupted run never
# leaves a half-processed page.

# Target languages. `code` must match the Hugo `languages:` key in hugo.yaml
# and the i18n/<code>.toml filename. `hreflang` is the BCP-47 tag emitted in
# <link rel="alternate" hreflang>.
languages:
  - code: de
    name: Deutsch
    hreflang: de
  - code: ru
    name: Русский
    hreflang: ru
  - code: zh-cn
    name: 简体中文
    hreflang: zh-Hans
  - code: hi
    name: हिन्दी
    hreflang: hi
  - code: es
    name: Español
    hreflang: es
  - code: pt-br
    name: Português (Brasil)
    hreflang: pt-BR

# Model. Every stage — translation, back-translation, both reviewers, revision —
# runs on Opus for maximum quality (decision 2026-07-17). Max output tokens and
# sampling are left at the Agent SDK defaults; the review gate, not a token cap,
# is what bounds quality here.
model:
  default: claude-opus-4-8

# Scope.
#
# Docs: ONLY the latest version is translated — older versions are noindex, so
# translating them burns the daily budget on pages search engines ignore. The
# version is NOT hardcoded here: lib.py reads `params.latest_version_id` from
# hugo.yaml, so a release bump moves the pipeline automatically and no stale
# version list has to be maintained. Everything under docs/ that is not the
# latest version (including `next`) is skipped.
#
# Blog: only recent posts are worth translating × 6 languages. `blog_since`
# drops any blog post whose date-prefixed path (blog/YYYY-MM-DD-…) is older
# than this cutoff. Bump it (or have the workflow compute now-60d) to roll the
# window forward. Set to empty string to translate the entire blog archive.
blog_since: "2026-05-17"
# Patterns are matched with pathlib semantics (right-anchored): a bare "*.md"
# means "any markdown page at any depth", "docs/**" means the docs subtree.
# Effective scope = these globs, minus exclude_globs, minus non-latest docs
# versions, minus blog posts older than blog_since.
translate_globs:
  - "_index.html"
  - "*.md"
  - "docs/**"        # narrowed to the latest version by lib.py (see above)
  - "blog/**"
exclude_globs:
  - "**/_include/**"

# Quality gate — runs on EVERY page (not just hero) before it is written.
# Each page goes through: translate -> back-translate -> two native reviewers
# -> revise-if-needed. A page is only written once it passes the gate, so the
# published tree is always post-review (publish-then-native-ratify, but with a
# machine review gate in front). All stages use Opus via the OAuth subscription.
back_translation:
  enabled: true
  # Round-trip check: translate the localized page back to English and compare
  # to the original. If meaning drifted (added/dropped/changed claims, numbers,
  # or technical facts), the page is revised and re-checked. max_retries bounds
  # the revise loop per page.
  max_retries: 2

review:
  # Two virtual native reviewers per target language, each with a distinct remit.
  # Both must pass (or the page is revised addressing their findings and
  # re-reviewed, up to max_rounds). Reviewers are prompted AS native speakers of
  # the target language.
  max_rounds: 2
  reviewers:
    - id: technical-editor
      prompt: prompts/review-editor.md      # literary quality / fluency / register
    - id: cozystack-maintainer
      prompt: prompts/review-maintainer.md  # technical correctness (k8s/Cozystack)

# Front-matter stamp written on pages that clear the machine gate. Native
# human owners flip this to "ratified" after their pass; the site can badge or
# prioritize by it. Machine gate never sets "ratified".
review_status_field: translation_review
review_status_value: auto-reviewed

# Publish mode.
#   pr_only:    open/update a PR and stop — a maintainer merges it (DEFAULT)
#   auto_merge: additionally enable GitHub auto-merge
#
# We deliberately use pr_only: nothing about CODEOWNERS or branch protection
# changes, and no machine output reaches the production site without a
# maintainer merging it. The runner translates DAILY (to use each day's quota)
# but accumulates into ONE branch per ISO week, so maintainers review and merge
# a single translation PR per week instead of a stream of them.
publish_mode: pr_only

# SEO note: there is deliberately no keyword-research step here. The English
# source is already SEO-optimized during authoring, so the translation carries
# that intent over — the translate prompt transcreates title/description to read
# naturally in the target language rather than translating them literally.
